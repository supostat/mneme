name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
  release:
    runs-on: ubuntu-latest
    needs: test
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build-release -- --tag "$GITHUB_REF_NAME"
      - run: gh release create "$GITHUB_REF_NAME" dist-release/mneme-* dist-release/SHA256SUMS --repo supostat/mneme-plugin --title "mneme $GITHUB_REF_NAME" --notes "mneme engine $GITHUB_REF_NAME"
      - run: gh api repos/supostat/mneme-plugin/dispatches --method POST --input dist-release/dispatch.json
